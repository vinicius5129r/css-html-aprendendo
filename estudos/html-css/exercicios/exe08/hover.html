<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exemplo de Hover</title>
    <style>
      body {
        font-family: Arial, sans-serif;
      }

      div > p {
        display: none;
      }
      div:hover > p {
        display: block;
        color: white;
        background-color: cadetblue;
        width: 300px;
      }
      div:hover {
        color: yellowgreen;
      }
    </style>
  </head>
  <body>
    <h1>Exemplo de Hover</h1>
    <p>Passe o mouse sobre este texto para ver o efeito de hover.</p>
    <div>
      Passe o mouse aqui
      <p>TEXTO ESCONDIDO</p>
    </div>
  </body>
</html>
